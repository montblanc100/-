<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חדר — דופליקטים</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100vh;
    overflow: hidden;
    background: #000;
    font-family: 'Heebo', sans-serif;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(180,130,0,0.12) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 50%, rgba(180,130,0,0.08) 0%, transparent 55%),
      radial-gradient(ellipse at 50% 100%, rgba(150,100,0,0.15) 0%, transparent 50%);
    pointer-events: none; z-index: 1;
  }

  .purple-flicker {
    position: fixed; bottom: -60px; left: -60px;
    width: 420px; height: 420px; border-radius: 50%;
    background: radial-gradient(circle, rgba(140,40,255,0.55) 0%, transparent 70%);
    pointer-events: none; z-index: 50;
    animation: flickerLight 6s ease-in-out infinite;
  }
  @keyframes flickerLight {
    0%  { opacity:0.6; transform:scale(1);    }
    20% { opacity:1;   transform:scale(1.05); }
    40% { opacity:0.4; transform:scale(0.97); }
    60% { opacity:0.9; transform:scale(1.03); }
    80% { opacity:0.5; transform:scale(0.98); }
    100%{ opacity:0.7; transform:scale(1);    }
  }

  .page {
    position: relative; z-index: 10;
    width: 100%; height: 100vh;
    display: grid;
    grid-template-columns: 0.6fr 3fr;
    gap: 0;
    animation: fadeIn 1s ease;
  }
  @keyframes fadeIn {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }

  .left-col {
    display: flex; flex-direction: column;
    gap: 8px; height: 100%;
    overflow-y: auto; padding: 8px;
    position: relative; z-index: 20;
  }
  .left-col::-webkit-scrollbar { width:3px; }
  .left-col::-webkit-scrollbar-thumb { background:rgba(155,50,255,0.3); border-radius:4px; }

  .item-card {
    border: 1.5px solid rgba(140,50,255,0.5);
    border-radius: 12px; cursor: pointer;
    transition: all 0.25s; flex-shrink: 0;
    position: relative; overflow: hidden;
    box-shadow: 0 0 14px rgba(130,40,255,0.25);
  }
  .item-card:hover {
    border-color: rgba(180,80,255,0.9);
    box-shadow: 0 0 28px rgba(160,60,255,0.55);
    transform: translateY(-2px);
  }
  .item-card:active { transform: scale(0.98); }
  .item-card img { width:100%; height:auto; display:block; }
  .item-card::after {
    content:''; position:absolute; inset:0;
    box-shadow: inset 0 0 28px rgba(0,0,0,0.75);
    border-radius:12px; pointer-events:none;
  }

  /* וי ירוק על פריט 1 */
  .item-card.done { cursor: default; }
  .item-card.done:hover { transform: none; box-shadow: 0 0 14px rgba(130,40,255,0.25); }
  .check-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 5; pointer-events: none;
    background: rgba(0,0,0,0.35);
    border-radius: 12px;
  }
  .check-mark {
    font-size: 52px;
    color: #00ff66;
    text-shadow: 0 0 20px rgba(0,255,100,0.9), 0 0 50px rgba(0,200,80,0.6);
    animation: checkPulse 2s ease-in-out infinite alternate;
  }
  @keyframes checkPulse {
    from { text-shadow: 0 0 16px rgba(0,255,100,0.7), 0 0 40px rgba(0,200,80,0.4); transform: scale(1); }
    to   { text-shadow: 0 0 30px rgba(0,255,100,1), 0 0 70px rgba(0,220,80,0.7); transform: scale(1.1); }
  }

  .exit-card {
    border: 1.5px solid rgba(140,50,255,0.4);
    border-radius: 12px; overflow: hidden;
    cursor: pointer; transition: all 0.25s;
    flex-shrink: 0; position: relative;
    box-shadow: 0 0 14px rgba(130,40,255,0.2);
  }
  .exit-card:hover {
    border-color: rgba(180,80,255,0.85);
    box-shadow: 0 0 28px rgba(160,60,255,0.5);
  }
  .exit-card img { width:100%; height:auto; display:block; }
  .exit-card::after {
    content:''; position:absolute; inset:0;
    box-shadow: inset 0 0 28px rgba(0,0,0,0.75);
    border-radius:12px; pointer-events:none;
  }

  /* תמונת תליון בפינה */
  .talisman-corner {
    position: fixed;
    top: 10px; left: 10px;
    z-index: 60;
    width: 120px;
    animation: talismanFloat 3s ease-in-out infinite alternate;
    filter: drop-shadow(0 0 16px rgba(200,160,255,0.6));
  }
  .talisman-corner img { width:100%; height:auto; display:block; border-radius:10px; }
  @keyframes talismanFloat {
    from { transform: translateY(0px) rotate(-2deg); }
    to   { transform: translateY(-8px) rotate(2deg); }
  }

  .right-col {
    overflow: hidden; height: 100%; position: relative;
  }
  .right-col img {
    width:104%; height:100%; object-fit:cover; display:block;
    animation: panRoom 20s ease-in-out infinite alternate;
  }
  @keyframes panRoom {
    0%   { transform: translateX(0%); }
    100% { transform: translateX(-1.5%); }
  }

  /* ══ פופאפים ══ */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.78);
    z-index: 300;
    display: flex; align-items: center; justify-content: center;
  }
  .overlay.hidden { display: none; }

  .popup {
    position: relative; border-radius: 20px;
    padding: 38px 44px; text-align: center;
    max-width: 420px; width: 90%;
    animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  @keyframes popIn {
    from { opacity:0; transform:scale(0.75); }
    to   { opacity:1; transform:scale(1); }
  }

  /* ניצחון */
  .popup.victory {
    background: linear-gradient(145deg, #0a0020, #110035);
    border: 1.5px solid rgba(150,60,255,0.75);
    box-shadow: 0 0 60px rgba(120,40,255,0.45), inset 0 0 40px rgba(100,30,200,0.12);
  }
  .popup.victory .chest-img {
    width: 120px; height: auto; margin: 0 auto 12px;
    display: block; filter: drop-shadow(0 0 16px rgba(192, 49, 13, 0.862));
    animation: chestGlow 2s ease-in-out infinite alternate;
  }
  @keyframes chestGlow {
    from { filter: drop-shadow(0 0 10px #7b2fff, #5a1fa8); }
    to   { filter: drop-shadow(0 0 28px #7b2fff, #5a1fa8); }
  }
  .popup.victory .popup-title {
    font-size: 22px; font-weight: 900; color: #fff;
    letter-spacing: 2px; margin-bottom: 10px;
    text-shadow: 0 0 24px rgba(180,100,255,0.6);
  }
  .popup.victory .popup-body {
    font-size: 15px; color: #d4b8ff; line-height: 2;
  }
  .popup.victory .popup-btn {
    margin-top: 22px;
    background: linear-gradient(135deg, #7b2fff, #5a1fa8);
    border: none; border-radius: 50px; padding: 12px 40px;
    font-family: 'Heebo', sans-serif; font-size: 16px; font-weight: 700;
    color: #fff; cursor: pointer;
    box-shadow: 0 6px 24px rgba(123,47,255,0.5);
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .popup.victory .popup-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 10px 36px rgba(123,47,255,0.7);
  }

  /* נעול */
  .popup.locked {
    background: linear-gradient(145deg, #00061a, #000d2e);
    border: 1.5px solid rgba(120,60,255,0.8);
    box-shadow: 0 0 60px rgba(50,80,255,0.3), inset 0 0 40px rgba(20,50,200,0.1);
  }
  .popup.locked .popup-icon { font-size:32px; margin-bottom:10px; }
  .popup.locked .popup-title {
    font-size:17px; font-weight:700; color:#fff; line-height:1.8;
    text-shadow: 0 0 16px rgba(80,140,255,0.4);
  }
  .popup.locked .close-btn {
    position:absolute; top:14px; left:18px;
    background:none; border:none; color:rgba(180,150,255,0.6);
    font-size:22px; cursor:pointer; transition:color 0.2s; line-height:1;
  }
  .popup.locked .close-btn:hover { color:#fff; }

  /* יציאה */
  .popup.exit {
    background: linear-gradient(145deg, #0a0020, #110035);
    border: 1.5px solid rgba(150,60,255,0.75);
    box-shadow: 0 0 60px rgba(120,40,255,0.45), inset 0 0 40px rgba(100,30,200,0.12);
  }
  .popup.exit .popup-icon { font-size:32px; margin-bottom:10px; }
  .popup.exit .popup-title {
    font-size:17px; font-weight:700; color:#fff; line-height:1.8;
    text-shadow: 0 0 16px rgba(180,100,255,0.4);
  }
  .popup.exit .close-btn {
    position:absolute; top:14px; left:18px;
    background:none; border:none; color:rgba(180,150,255,0.6);
    font-size:22px; cursor:pointer; transition:color 0.2s; line-height:1;
  }
  .popup.exit .close-btn:hover { color:#fff; }
</style>
</head>
<body>

<!-- ══ פופאפ ניצחון תיבה ══ -->
<div class="overlay" id="overlay-victory">
  <div class="popup victory">
    <!-- ▼ תמונת התיבה ▼ -->
    <img class="chest-img" src="img/ספר הריקורדום2.png" alt="התיבה"
      onerror="this.style.fontSize='48px';this.outerHTML='<div style=\'font-size:48px;margin-bottom:12px\'>📦</div>'">
    <div class="popup-title">כל הכבוד!</div>
    <div class="popup-body">
      הצלחתם לפתוח את הארון<br>
      ולקחת את <strong style="color:#c084fc;">ספר הריקורדום</strong>
      <br> כעת דלת היציאה פתוחה, ברחו מהר מכאן! והחביאו את החפצים במקום בו זירו לא יגיע לעולם.
    </div>
    <button class="popup-btn" onclick="closePopup('overlay-victory')">המשך ◆</button>
  </div>
</div>

<!-- ══ פופאפ נעול ══ -->
<div class="overlay hidden" id="overlay-locked">
  <div class="popup locked">
    <button class="close-btn" onclick="closePopup('overlay-locked')">✕</button>
    <div class="popup-icon">🔒</div>
    <div class="popup-title">❌ כדי לפתור חידה זו<br>צריך לפתור את החידה הקודמת ❌</div>
  </div>
</div>

<!-- ══ פופאפ יציאה ══ -->
<div class="overlay hidden" id="overlay-exit">
  <div class="popup exit">
    <button class="close-btn" onclick="closePopup('overlay-exit')">✕</button>
    <div class="popup-icon">🚪</div>
    <div class="popup-title">צריך לחלץ את כל האביזרים<br>כדי לצאת מן החדר</div>
  </div>
</div>

<!-- אורות -->
<div class="purple-flicker"></div>
<div style="position:fixed;top:10%;right:5%;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(130,40,255,0.3) 0%,transparent 70%);pointer-events:none;z-index:50;animation:flickerLight 7s ease-in-out infinite;"></div>
<div style="position:fixed;top:55%;right:20%;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(120,30,220,0.25) 0%,transparent 70%);pointer-events:none;z-index:50;animation:flickerLight 8s ease-in-out 0.5s infinite;"></div>
<div style="position:fixed;bottom:15%;left:35%;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(150,50,255,0.2) 0%,transparent 70%);pointer-events:none;z-index:50;animation:flickerLight 9s ease-in-out 1s infinite;"></div>
<div style="position:fixed;top:30%;left:25%;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(110,30,200,0.2) 0%,transparent 70%);pointer-events:none;z-index:50;animation:flickerLight 10s ease-in-out 0.3s infinite;"></div>

<!-- תליון בפינה שמאל עליון מעל תמונת החדר -->
<div class="talisman-corner">
  <!-- ▼ תמונת התליון ▼ -->
  <img src="img/תליון_הקסגונום.jpg" alt="תליון ההקסגונום"
    onerror="this.style.display='none'">
</div>

<div class="page">
  <div class="left-col">

    <!-- פריט 1 — התיבה (הושלמה) -->
    <div class="item-card done">
      <img src="img/תמונה מספר 5.png" alt="פריט 1">
      <div class="check-overlay">
        <div class="check-mark">✓</div>
      </div>
    </div>

    <!-- פריט 2 — הכדור (הושלם) -->
    <div class="item-card done">
      <img src="img/תמונה מספר 6.png" alt="פריט 2">
      <div class="check-overlay">
        <div class="check-mark">✓</div>
      </div>
    </div>

    <!-- פריט 3 — פתוח -->
    <div class="item-card done">
      <img src="img/תמונה מספר 7.png" alt="פריט 3">
      <div class="check-overlay">
        <div class="check-mark">✓</div>
      </div>
    </div>

    <!-- דלת יציאה -->
    <div class="item-card" onclick="window.location.href='דף סיום.html'">
      <img src="img/תמונה מספר 8.png" alt="יציאה">
    </div>

  </div>

  <div class="right-col">
    <img src="img/תמונה מספר 4.jpg" alt="החדר">
  </div>
</div>

<script>
  function showPopup(id) { document.getElementById(id).classList.remove('hidden'); }
  function closePopup(id) { document.getElementById(id).classList.add('hidden'); }
</script>

</body>
</html>
