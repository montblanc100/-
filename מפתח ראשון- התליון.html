<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>המפתח הראשון</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Cinzel:wght@700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            min-height: 100vh;
            overflow-y: auto;
            font-family: 'Heebo', sans-serif;
        }

        /* ── רקע = תמונת התיבה ── */
        body {
            background: url('img/תמונה מספר 9.png') center center / cover no-repeat;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(10, 4, 20, 0.72);
            pointer-events: none;
            z-index: 0;
        }

        .top-bar {
            position: relative;
            z-index: 10;
            padding: 11px 24px;
            background: linear-gradient(90deg, rgba(80, 20, 140, 0.5), rgba(50, 10, 100, 0.2), transparent);
            border-bottom: 1px solid rgba(160, 80, 255, 0.25);
        }

        .top-bar h1 {
            font-family: 'Cinzel', serif;
            font-size: 20px;
            color: #d4a0ff;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(180, 100, 255, 0.6);
        }

        .main-grid {
            position: relative;
            z-index: 10;
            width: 100%;
            min-height: calc(100vh - 50px);
            height: auto;
            display: grid;
            grid-template-columns: 1.2fr 0.7fr 1.5fr;
            grid-template-rows: auto auto;
            gap: 10px;
            padding: 10px;
        }

        /* כרטיסים — שקוף לגמרי */
        .card {
            border: 1px solid rgba(150, 60, 255, 0.3);
            border-radius: 16px;
            background: transparent;
            overflow: hidden;
            position: relative;
        }

        /* ── גלגל ── */
        .wheel-card {
            grid-column: 1;
            grid-row: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px;
            overflow: visible;
        }

        .rings-wrap {
            position: relative;
            width: min(440px, calc(100% - 10px));
            aspect-ratio: 1;
            overflow: visible;
        }

        .ring-svg {
            width: 100%;
            height: 100%;
            position: absolute;
            inset: 0;
            overflow: visible;
        }

        .arrow-indicator {
            position: absolute;
            bottom: -36px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 26px;
            color: #ff2222;
            text-shadow: 0 0 14px rgba(255, 40, 40, 1);
            pointer-events: none;
        }

        .check-btn {
            background: linear-gradient(135deg, #7b2fff, #5a1fa8);
            border: none;
            border-radius: 50px;
            padding: 12px 0;
            width: min(320px, 85%);
            font-family: 'Heebo', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            letter-spacing: 2px;
            box-shadow: 0 6px 20px rgba(123, 47, 255, 0.5);
            transition: all 0.25s;
            margin-top: 36px;
            position: relative;
            z-index: 2;
        }

        .check-btn:hover {
            box-shadow: 0 8px 30px rgba(123, 47, 255, 0.8);
            transform: translateY(-1px);
        }

        .feedback {
            font-size: 13px;
            color: #ff6666;
            min-height: 18px;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        .feedback.ok {
            color: #00ff88;
        }

        /* טקסט חידה — שקוף */
        .riddle-card {
            grid-column: 2;
            grid-row: 1;
            display: flex;
            flex-direction: column;
            padding: 22px 18px;
            gap: 12px;
            overflow-y: auto;
            background: transparent;
        }

        .riddle-label {
            font-size: 10px;
            letter-spacing: 3px;
            color: rgba(200, 140, 255, 0.8);
            text-transform: uppercase;
        }

        .riddle-text {
            font-size: 14px;
            color: #ecdeff;
            line-height: 2.1;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.8);
        }

        /* מכתב — שקוף, רק תמונה */
        .letter-card {
            grid-column: 3;
            grid-row: 1/3;
            padding: 0;
            background: transparent;
        }

        .letter-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 16px;
        }

        /* תיבה + מנעולים */
        .chest-card {
            grid-column: 1/3;
            grid-row: 2;
            display: flex;
            align-items: center;
            padding: 10px 16px;
            gap: 14px;
            background: transparent;
        }

        .chest-card img {
            height: 108px;
            width: auto;
            object-fit: contain;
            border-radius: 8px;
        }

        .locks-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .lock-icon {
            font-size: 26px;
            filter: grayscale(1) brightness(0.45);
            transition: all 0.5s;
        }

        .lock-icon.open {
            filter: none;
            text-shadow: 0 0 14px rgba(255, 210, 0, 0.9);
            animation: lockPop 0.5s ease;
        }

        @keyframes lockPop {
            0% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.5) rotate(-20deg)
            }

            100% {
                transform: scale(1)
            }
        }

        /* מפתח עף */
        #key-anim {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 600;
            pointer-events: none;
        }

        #key-anim.run {
            display: block;
        }

        #flying-key {
            position: absolute;
            font-size: 80px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-shadow: 0 0 30px rgba(255, 210, 0, 0.8);
        }

        /* פופאפ ניצחון */
        .win-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.82);
            z-index: 500;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }

        .win-overlay.show {
            display: flex;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        .win-emoji {
            font-size: 72px;
            animation: floatKey 1.6s ease-in-out infinite alternate;
        }

        @keyframes floatKey {
            from {
                transform: translateY(0) rotate(-8deg)
            }

            to {
                transform: translateY(-14px) rotate(8deg)
            }
        }

        .win-msg {
            font-family: 'Cinzel', serif;
            font-size: 24px;
            color: #ffd700;
            letter-spacing: 4px;
            text-shadow: 0 0 30px rgba(255, 210, 0, 0.7);
        }

        .win-btn {
            margin-top: 8px;
            background: linear-gradient(135deg, #7b2fff, #5a1fa8);
            border: none;
            border-radius: 50px;
            padding: 13px 40px;
            font-family: 'Heebo', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(123, 47, 255, 0.5);
            transition: all 0.2s;
        }

        .win-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <h1>🗝️ &nbsp; המפתח הראשון</h1>
    </div>

    <div class="main-grid">

        <!-- גלגל -->
        <div class="card wheel-card">
            <div class="rings-wrap" id="rings-wrap">
                <svg class="ring-svg" id="ring-svg" viewBox="-225 -225 450 450"></svg>
                <div class="arrow-indicator">▲</div>
            </div>
            <button class="check-btn" onclick="checkAnswer()">◆ &nbsp; בדוק תשובה</button>
            <div class="feedback" id="feedback"></div>
        </div>

        <!-- טקסט חידה -->
        <div class="card riddle-card">
            <div class="riddle-label">◆ חידה · מפתח ראשון</div>
            <div class="riddle-text">
                ישנו אחד היכול ללבוש את התליון.
                תנו לו אותו,<br>
                <strong>מהר!</strong><br>
                לפני שזירו יבוא.<br><br><br><br>
                <strong>מול החץ האדום מבפנים לבחוץ</strong><br>
                1-1-5<br>
                2-3-9<br>
                3-13-1<br>
                4-8-7<br>
                5-12-3<br>
                6-19-7<br>
                7-3-18<br>
            </div>
        </div>

        <!-- מכתב -->
        <div class="card letter-card">
            <img src="img/תמונה 3.png" alt="מכתב קאלי">
        </div>

        <!-- תיבה -->
        <div class="card chest-card">
            <img src="img/תמונה מספר 9.png" alt="התיבה">
            <div class="locks-row">
                <div class="lock-icon" id="lock0">🔒</div>
                <div class="lock-icon" id="lock1">🔒</div>
                <div class="lock-icon" id="lock2">🔒</div>
                <div class="lock-icon" id="lock3">🔒</div>
                <div class="lock-icon" id="lock4">🔒</div>
            </div>
        </div>
    </div>

    <div id="key-anim">
        <div id="flying-key">🗝️</div>
    </div>

    <div class="win-overlay" id="win-overlay">
        <div class="win-emoji">🗝️</div>
        <div class="win-msg">מצאת את המפתח הראשון!</div>
        <a href="מפתח שני- התליון.html"><button class="win-btn" onclick="goNext()">המשך לחידה הבאה ◆</button></a>
    </div>

      <audio id="background-music" controls>
    <source src="מוזיקת רקע/מנגינה מספר 4.mp3" type="audio/mpeg">
    הדפדפן שלך אינו תומך בהשמעת אודיו.
  </audio>

    <script>
        const LETTERS = ['א', 'ב', 'ג', 'ד', 'ה', 'ו', 'ז', 'ח', 'ט', 'י', 'כ', 'ל', 'מ', 'נ', 'ס', 'ע', 'פ', 'צ', 'ק', 'ר', 'ש', 'ת'];
        const N = LETTERS.length; // 22
        // פרוטוקול אבטחה
        const _k = '15PXoNeZ15TXkNeo15g=';
        const ANSWER = [...new TextDecoder().decode(Uint8Array.from(atob(_k), c => c.charCodeAt(0)))];
        const NUM_RINGS = 7;

        // רדיוסים — גדולים יותר לגלגלים פנימיים
        const RADII = [44, 74, 104, 130, 156, 180, 205];

        let ringAngle = Array(NUM_RINGS).fill(0);
        const svg = document.getElementById('ring-svg');
        let groups = [];

        function buildRings() {
            svg.innerHTML = '';
            groups = [];
            const NS = 'http://www.w3.org/2000/svg';
            const defs = document.createElementNS(NS, 'defs');
            defs.innerHTML = `<filter id="ag"><feGaussianBlur stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
            svg.appendChild(defs);

            // רקע
            const bg = document.createElementNS(NS, 'circle');
            bg.setAttribute('cx', '0'); bg.setAttribute('cy', '0'); bg.setAttribute('r', '212');
            bg.setAttribute('fill', '#0a0118');
            bg.setAttribute('stroke', 'rgba(160,80,255,0.6)'); bg.setAttribute('stroke-width', '2');
            svg.appendChild(bg);

            // קו מדריך אדום
            const guide = document.createElementNS(NS, 'line');
            guide.setAttribute('x1', '0'); guide.setAttribute('y1', '-212');
            guide.setAttribute('x2', '0'); guide.setAttribute('y2', '212');
            guide.setAttribute('stroke', 'rgba(255,40,40,0.18)');
            guide.setAttribute('stroke-width', '1.5'); guide.setAttribute('stroke-dasharray', '4,5');
            svg.appendChild(guide);

            // בנה כל טבעת כ-stroke עבה על עיגול — ללא clipPath
            for (let r = 0; r < NUM_RINGS; r++) {
                const rad = RADII[r];
                const inner = r === 0 ? 0 : RADII[r - 1];
                const band = rad - inner;
                const strokeR = (inner + rad) / 2;  // רדיוס אמצעי
                const textR = strokeR;
                const fontSize = Math.max(9, Math.min(band * 0.55, 13));

                // קבוצה — ROTATE כאן
                const g = document.createElementNS(NS, 'g');
                g.setAttribute('id', 'rg' + r);
                g.style.transformOrigin = '0px 0px';
                g.style.transition = 'transform 0.4s cubic-bezier(0.34,1.3,0.64,1)';
                g.style.transform = 'rotate(0deg)';

                // פס הטבעת — עיגול עם stroke-width = רוחב הפס
                const band_circle = document.createElementNS(NS, 'circle');
                band_circle.setAttribute('cx', '0'); band_circle.setAttribute('cy', '0');
                band_circle.setAttribute('r', strokeR);
                band_circle.setAttribute('fill', 'none');
                band_circle.setAttribute('stroke', r % 2 === 0 ? '#3b1278' : '#220a50');
                band_circle.setAttribute('stroke-width', band - 1);
                g.appendChild(band_circle);

                // אותיות
                LETTERS.forEach((lt, li) => {
                    const deg = li * (360 / N) - 90;
                    const rad_ = deg * Math.PI / 180;
                    const x = textR * Math.cos(rad_);
                    const y = textR * Math.sin(rad_);
                    const t = document.createElementNS(NS, 'text');
                    t.setAttribute('x', x); t.setAttribute('y', y);
                    t.setAttribute('text-anchor', 'middle');
                    t.setAttribute('dominant-baseline', 'central');
                    t.setAttribute('font-size', fontSize);
                    t.setAttribute('font-family', 'Heebo,Arial,sans-serif');
                    t.setAttribute('font-weight', '700');
                    t.setAttribute('fill', '#f0daff');
                    t.setAttribute('transform', `rotate(${-deg},${x},${y})`);
                    t.dataset.li = li;
                    t.textContent = lt;
                    g.appendChild(t);
                });

                svg.appendChild(g);
                groups.push(g);

                // קו הפרדה חיצוני — מחוץ לקבוצה (לא מסתובב)
                const sep = document.createElementNS(NS, 'circle');
                sep.setAttribute('cx', '0'); sep.setAttribute('cy', '0'); sep.setAttribute('r', rad);
                sep.setAttribute('fill', 'none');
                sep.setAttribute('stroke', 'rgba(190,100,255,0.85)');
                sep.setAttribute('stroke-width', '1.2');
                svg.appendChild(sep);
            }

            // עיגול לבן קטן במרכז
            const center = document.createElementNS(NS, 'circle');
            center.setAttribute('cx', '0'); center.setAttribute('cy', '0'); center.setAttribute('r', '6');
            center.setAttribute('fill', 'rgba(200,140,255,0.6)');
            svg.appendChild(center);

            // חץ אדום
            const ag = document.createElementNS(NS, 'g');
            ag.setAttribute('filter', 'url(#ag)');
            const arr = document.createElementNS(NS, 'polygon');
            arr.setAttribute('points', '0,222 -11,207 11,207');
            arr.setAttribute('fill', '#ff2020');
            ag.appendChild(arr);
            svg.appendChild(ag);
        }

        function rotateRing(r, dir) {
            ringAngle[r] += dir * (360 / N);
            groups[r].style.transform = `rotate(${ringAngle[r]}deg)`;
            groups[r].querySelectorAll('text').forEach(t => {
                const li = parseInt(t.dataset.li);
                const deg = li * (360 / N) - 90;
                const x = parseFloat(t.getAttribute('x'));
                const y = parseFloat(t.getAttribute('y'));
                t.setAttribute('transform', `rotate(${-deg - ringAngle[r]},${x},${y})`);
            });
        }

        document.getElementById('rings-wrap').addEventListener('click', e => {
            const rect = document.getElementById('rings-wrap').getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const dx = e.clientX - cx;
            const dy = e.clientY - cy;
            const nd = Math.sqrt(dx * dx + dy * dy) / (rect.width / 440);

            let r = -1;
            for (let i = 0; i < NUM_RINGS; i++) {
                const inner = i === 0 ? 0 : RADII[i - 1];
                if (nd >= inner && nd <= RADII[i]) { r = i; break; }
            }
            if (r < 0) return;
            rotateRing(r, dx > 0 ? 1 : -1);
        });

        function getLetterAtBottom(r) {
            const idx = ((Math.round((180 - ringAngle[r]) / (360 / N)) % N) + N) % N;
            return LETTERS[idx];
        }

        function checkAnswer() {
            const fb = document.getElementById('feedback');
            const correct = ANSWER.every((letter, i) => getLetterAtBottom(i) === letter);
            if (correct) {
                fb.textContent = '✓ נכון! מוצא את המפתח...';
                fb.className = 'feedback ok';
                animateKey();
            } else {
                fb.textContent = '✗ תשובה שגויה, נסה שוב';
                fb.className = 'feedback';
            }
        }

        function animateKey() {
            const lock0 = document.getElementById('lock0');
            const lr = lock0.getBoundingClientRect();
            const tx = lr.left + lr.width / 2 - window.innerWidth / 2;
            const ty = lr.top + lr.height / 2 - window.innerHeight / 2;
            const st = document.createElement('style');
            st.textContent = `@keyframes kf{
    0%{top:50%;left:50%;transform:translate(-50%,-50%) scale(1);opacity:1;}
    55%{transform:translate(-50%,-50%) scale(1.4);opacity:1;}
    100%{top:calc(50% + ${ty}px);left:calc(50% + ${tx}px);transform:translate(-50%,-50%) scale(0.3);opacity:0;}
  }`;
            document.head.appendChild(st);
            const ka = document.getElementById('key-anim');
            const fk = document.getElementById('flying-key');
            fk.style.animation = 'none'; ka.classList.add('run');
            fk.style.animation = 'kf 1.5s cubic-bezier(0.4,0,0.2,1) forwards';
            setTimeout(() => {
                ka.classList.remove('run');
                lock0.classList.add('open'); lock0.textContent = '🔓';
                setTimeout(() => document.getElementById('win-overlay').classList.add('show'), 700);
            }, 1500);
        }

        function goNext() { window.location.href = 'duplicates_puzzle2.html'; }

        buildRings();
    </script>
</body>

</html>
