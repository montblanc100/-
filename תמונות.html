<!DOCTYPE html>
<html dir="rtl" lang="he">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>גלריית תמונות - סדרת דופליקטים</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap');

        :root {
            --main-color: #008080;
            --text-color: #f6f9f9;
            --purple: #4a0072;
            --purple-glow: #9d00ff;
        }

        body {
            font-family: 'Heebo', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('images/צילום\ מסך\ 2025-04-17\ 131825.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            margin: 0;
            padding: 0;
            direction: rtl;
            overflow-x: hidden;
        }

        /* שכבת אפקט קסום */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(circle at 20% 30%, rgba(0, 128, 128, 0.15) 0%, transparent 70%),
                radial-gradient(circle at 80% 10%, rgba(0, 128, 128, 0.1) 0%, transparent 60%);
            z-index: -1;
            pointer-events: none;
        }

        /* אנימציית חלקיקים מרחפים */
        @keyframes float {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }

            50% {
                opacity: 0.3;
            }

            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
        }

        /* כותרת ראשית */
        .header {
            background-color: var(--purple);
            box-shadow: 0 0 15px var(--purple-glow);
            border: 1px solid var(--purple-glow);
            color: white;
            text-align: center;
            padding: 2rem;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 50% 100%, 0 85%);
        }

        .header::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
            z-index: 0;
        }

        @keyframes rotate {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        h1 {
            margin: 0;
            font-size: 3rem;
            font-weight: 900;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.3), 0 0 20px rgba(0, 128, 128, 0.5);
            position: relative;
            z-index: 1;
        }

        .back-button {
            position: absolute;
            top: 50%;
            right: 2rem;
            transform: translateY(-50%);
            background: linear-gradient(45deg, var(--purple-glow), var(--main-color));
            color: white;
            padding: 0.8rem 1.5rem;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(157, 0, 255, 0.3);
            z-index: 2;
            font-family: inherit;
        }

        .back-button:hover {
            transform: translateY(-50%) scale(1.05);
            box-shadow: 0 8px 25px rgba(157, 0, 255, 0.5);
            color: white;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem 3rem;
            position: relative;
            z-index: 1;
        }

        /* גלריה */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .gallery-item {
            background-color: var(--purple);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 15px var(--purple-glow);
            border: 1px solid var(--purple-glow);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            position: relative;
        }

        .gallery-item:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 30px rgba(157, 0, 255, 0.4);
        }

        .gallery-item::before {
            content: "";
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, transparent, rgba(0, 128, 128, 0.3), transparent);
            z-index: -1;
            border-radius: 17px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .gallery-item:hover::before {
            opacity: 1;
        }

        .gallery-image {
            width: 100%;
            height: 250px;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .gallery-item:hover .gallery-image {
            transform: scale(1.1);
        }

        .gallery-info {
            padding: 1.5rem;
            color: var(--text-color);
            text-align: center;
        }

        .gallery-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
        }

        .gallery-desc {
            font-size: 0.9rem;
            opacity: 0.8;
        }

        /* מודל תמונה צפה */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .modal-content {
            position: relative;
            margin: auto;
            display: block;
            width: 90%;
            max-width: 800px;
            max-height: 80%;
            object-fit: contain;
            top: 50%;
            transform: translateY(-50%);
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: zoomIn 0.3s ease;
        }

        @keyframes zoomIn {
            from {
                transform: translateY(-50%) scale(0.5);
            }

            to {
                transform: translateY(-50%) scale(1);
            }
        }

        .close {
            position: absolute;
            top: 15px;
            left: 35px;
            color: #fff;
            font-size: 40px;
            font-weight: bold;
            transition: 0.3s;
            cursor: pointer;
            z-index: 1001;
            background: rgba(0, 0, 0, 0.5);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }

        .close:hover,
        .close:focus {
            color: var(--purple-glow);
            transform: scale(1.1);
        }

        /* כפתורי ניווט */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(74, 0, 114, 0.8);
            color: white;
            border: 2px solid var(--purple-glow);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
        }

        .nav-btn:hover {
            background: var(--purple-glow);
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 0 20px var(--purple-glow);
        }

        .prev-btn {
            right: 20px;
        }

        .next-btn {
            left: 20px;
        }

        /* כפתור הורדה */
        .download-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(45deg, var(--purple-glow), var(--main-color));
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(157, 0, 255, 0.3);
            font-family: inherit;
            font-size: 16px;
            z-index: 1001;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .download-btn:hover {
            transform: translateX(-50%) translateY(-3px);
            box-shadow: 0 8px 25px rgba(157, 0, 255, 0.5);
        }

        /* מידע על התמונה במודל */
        .modal-info {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(157, 0, 255, 0.3);
            z-index: 1001;
        }

        .modal-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 5px;
            color: var(--purple-glow);
        }

        .modal-desc {
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* מונה תמונות */
        .image-counter {
            position: absolute;
            top: 20px;
            right: 50%;
            transform: translateX(50%);
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(157, 0, 255, 0.3);
            z-index: 1001;
        }

        /* תמיכה במסכים קטנים */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .back-button {
                position: static;
                transform: none;
                margin-top: 1rem;
                display: inline-block;
            }

            .header {
                text-align: center;
                padding-bottom: 3rem;
            }

            .gallery-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 1.5rem;
            }

            .modal-content {
                width: 95%;
                max-height: 70%;
            }

            .nav-btn {
                width: 50px;
                height: 50px;
                font-size: 16px;
            }

            .prev-btn {
                right: 10px;
            }

            .next-btn {
                left: 10px;
            }

            .close {
                left: 15px;
                top: 15px;
                width: 40px;
                height: 40px;
                font-size: 30px;
            }

            .modal-info {
                bottom: 100px;
                left: 10px;
                right: 10px;
                transform: none;
            }
        }

        /* סמן קסום */
        .magic-cursor {
            width: 30px;
            height: 30px;
            border: 2px solid rgba(0, 128, 128, 0.5);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, border-color 0.2s;
            backdrop-filter: blur(2px);
            display: none;
        }
    </style>
</head>

<body>
    <!-- אלמנט מצביע קסום -->
    <div class="magic-cursor"></div>

    <div class="header">
        <h1>גלריית תמונות</h1>
        <a href="index.html" class="back-button">← חזרה</a>
    </div>

    <div class="container">
        <div class="gallery-grid" id="gallery">
            <!-- התמונות ייווצרו דינמית ב-JavaScript -->
        </div>
    </div>

    <!-- מודל תמונה צפה -->
    <div id="imageModal" class="modal">
        <span class="close">&times;</span>
        <div class="image-counter">
            <span id="currentImageNumber">1</span> / <span id="totalImages">0</span>
        </div>
        <img class="modal-content" id="modalImage" alt="תמונה בגודל מלא">
        <div class="modal-info">
            <div class="modal-title" id="modalTitle">כותרת התמונה</div>
            <div class="modal-desc" id="modalDesc">תיאור התמונה</div>
        </div>
        <button class="nav-btn prev-btn" id="prevBtn">←</button>
        <button class="nav-btn next-btn" id="nextBtn">→</button>
        <a href="#" class="download-btn" id="downloadBtn" download>
            📥 הורד תמונה
        </a>
    </div>

    <script>
        // מערך התמונות
        const images = [
            {
                src: 'images/סמל דופליקטים 3d.jpg',
                title: 'הסמל',
            },
            {
                src: 'images/ממורי צ׳יפ 1.png',
                title: 'ממורי צ׳יפ',
            },
            {
                src: 'images/חרב המורטום.jpg',
                title: 'חרב המורטום',
            },
            {
                src: 'images/זירו.jpg',
                title: 'זירו',
            },
            {
                src: 'images/כדור הטונגו 1.png',
                title: 'כדור הטונגו',
            },
            {
                src: 'images/ספר הריקורדום.png',
                title: 'ספר הריקורדום',
            },
            // ניתן להוסיף עוד תמונות כאן
            {
                src: 'images/קאזנס.jpeg',
                title: 'רצח מהדי',
            },
            {
                src: 'images/קאזנס2.png',
                title: 'קאזנס בריקורדום',
            },
            {
                src: 'images/הזאבים.jpeg',
                title: 'זאבי הקרצ׳ר',
            },
        ];

        let currentImageIndex = 0;

        // יצירת הגלריה
        function createGallery() {
            const gallery = document.getElementById('gallery');
            const totalImagesSpan = document.getElementById('totalImages');

            totalImagesSpan.textContent = images.length;

            images.forEach((image, index) => {
                const item = document.createElement('div');
                item.className = 'gallery-item';
                item.onclick = () => openModal(index);

                item.innerHTML = `
          <img src="${image.src}" alt="${image.title}" class="gallery-image" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjgwIiBoZWlnaHQ9IjI1MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjNGEwMDcyIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZvbnQtZmFtaWx5PSJBcmlhbCwgc2Fucy1zZXJpZiIgZm9udC1zaXplPSIxOCIgZmlsbD0iI2Y2ZjlmOSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZHk9Ii4zZW0iPtei15XXnSDXnNCXXqk8L3RleHQ+PC9zdmc+'">
          <div class="gallery-info">
            <div class="gallery-title">${image.title}</div>
            <div class="gallery-desc">${image.desc}</div>
          </div>
        `;

                gallery.appendChild(item);
            });
        }

        // פתיחת המודל
        function openModal(index) {
            currentImageIndex = index;
            updateModal();
            document.getElementById('imageModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        // עדכון המודל
        function updateModal() {
            const modal = document.getElementById('imageModal');
            const modalImage = document.getElementById('modalImage');
            const modalTitle = document.getElementById('modalTitle');
            const modalDesc = document.getElementById('modalDesc');
            const downloadBtn = document.getElementById('downloadBtn');
            const currentImageNumber = document.getElementById('currentImageNumber');

            const currentImage = images[currentImageIndex];

            modalImage.src = currentImage.src;
            modalImage.alt = currentImage.title;
            modalTitle.textContent = currentImage.title;
            modalDesc.textContent = currentImage.desc;
            downloadBtn.href = currentImage.src;
            downloadBtn.download = currentImage.title + '.png';
            currentImageNumber.textContent = currentImageIndex + 1;
        }

        // סגירת המודל
        function closeModal() {
            document.getElementById('imageModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        // מעבר לתמונה הבאה
        function nextImage() {
            currentImageIndex = (currentImageIndex + 1) % images.length;
            updateModal();
        }

        // מעבר לתמונה הקודמת
        function prevImage() {
            currentImageIndex = (currentImageIndex - 1 + images.length) % images.length;
            updateModal();
        }

        // יצירת חלקיקים מרחפים
        function createParticles() {
            const container = document.body;

            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.classList.add('particle');

                    const posX = Math.random() * window.innerWidth;
                    const posY = Math.random() * window.innerHeight;
                    const size = Math.random() * 6 + 2;
                    const hue = 175 + Math.random() * 10;
                    const opacity = Math.random() * 0.4 + 0.1;

                    particle.style.left = posX + 'px';
                    particle.style.top = posY + 'px';
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    particle.style.background = `hsla(${hue}, 70%, 70%, ${opacity})`;

                    const duration = Math.random() * 10 + 5;
                    const delay = Math.random() * 5;
                    particle.style.animation = `float ${duration}s ease-in infinite ${delay}s`;

                    container.appendChild(particle);
                }, i * 200);
            }
        }

        // אפקט מצביע קסום
        function setupMagicCursor() {
            const cursor = document.querySelector('.magic-cursor');

            if (window.matchMedia('(pointer: fine)').matches) {
                cursor.style.display = 'block';

                document.addEventListener('mousemove', (e) => {
                    cursor.style.left = e.clientX + 'px';
                    cursor.style.top = e.clientY + 'px';
                });

                document.querySelectorAll('.gallery-item, .back-button, .nav-btn, .download-btn, .close').forEach(item => {
                    item.addEventListener('mouseenter', () => {
                        cursor.style.width = '50px';
                        cursor.style.height = '50px';
                        cursor.style.borderColor = 'rgba(0, 128, 128, 0.8)';
                    });

                    item.addEventListener('mouseleave', () => {
                        cursor.style.width = '30px';
                        cursor.style.height = '30px';
                        cursor.style.borderColor = 'rgba(0, 128, 128, 0.5)';
                    });
                });
            }
        }

        // אירועי מקלדת
        function setupKeyboardEvents() {
            document.addEventListener('keydown', (e) => {
                const modal = document.getElementById('imageModal');
                if (modal.style.display === 'block') {
                    switch (e.key) {
                        case 'Escape':
                            closeModal();
                            break;
                        case 'ArrowLeft':
                            nextImage();
                            break;
                        case 'ArrowRight':
                            prevImage();
                            break;
                    }
                }
            });
        }

        // הפעלת הפונקציות כאשר הדף נטען
        document.addEventListener('DOMContentLoaded', () => {
            createGallery();
            createParticles();
            setupMagicCursor();
            setupKeyboardEvents();

            // אירועי לחיצה
            document.querySelector('.close').onclick = closeModal;
            document.getElementById('nextBtn').onclick = nextImage;
            document.getElementById('prevBtn').onclick = prevImage;

            // סגירה בלחיצה על הרקע
            document.getElementById('imageModal').onclick = (e) => {
                if (e.target === e.currentTarget) {
                    closeModal();
                }
            };

            // אנימציית כניסה לתמונות
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.opacity = '1';
                        entry.target.style.transform = 'translateY(0)';
                    }
                });
            }, { threshold: 0.1 });

            // המתנה קצרה לאחר יצירת הגלריה
            setTimeout(() => {
                document.querySelectorAll('.gallery-item').forEach(item => {
                    item.style.opacity = '0';
                    item.style.transform = 'translateY(30px)';
                    item.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
                    observer.observe(item);
                });
            }, 100);
        });
    </script>
</body>

</html>
