<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ספר הריקודרדום</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&family=Cinzel:wght@700&family=IM+Fell+English:ital@1&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100vh;
      font-family: 'Heebo', sans-serif;
      overflow-y: auto;
    }

    body {
      background: url('img/תמונה מספר 9.png') center center/cover no-repeat fixed;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: rgba(10, 4, 20, 0.78);
      pointer-events: none;
      z-index: 0;
    }

    .top-bar {
      position: relative;
      z-index: 10;
      padding: 11px 24px;
      background: linear-gradient(90deg, rgba(80, 20, 140, 0.5), rgba(50, 10, 100, 0.2), transparent);
      border-bottom: 1px solid rgba(160, 80, 255, 0.25);
    }

    .top-bar h1 {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      color: #d4a0ff;
      letter-spacing: 4px;
      text-shadow: 0 0 20px rgba(180, 100, 255, 0.6);
    }

    .main-wrap {
      position: relative;
      z-index: 10;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      max-width: 700px;
      margin: 0 auto;
    }

    /* טקסט מעוצב מעל */
    .top-text {
      width: 100%;
      text-align: center;
      font-family: 'IM Fell English', serif;
      font-style: italic;
      font-size: 17px;
      color: #d4b8ff;
      line-height: 2;
      letter-spacing: 1px;
      text-shadow: 0 0 16px rgba(160, 80, 255, 0.3);
      border: 1px solid rgba(150, 60, 255, 0.2);
      border-radius: 14px;
      padding: 18px 24px;
      background: rgba(20, 5, 45, 0.4);
      position: relative;
    }

    .top-text::before {
      content: '❝';
      position: absolute;
      top: -14px;
      right: 20px;
      font-size: 36px;
      color: rgba(180, 100, 255, 0.4);
      line-height: 1;
      font-family: serif;
    }

    .top-text::after {
      content: '❞';
      position: absolute;
      bottom: -18px;
      left: 20px;
      font-size: 36px;
      color: rgba(180, 100, 255, 0.4);
      line-height: 1;
      font-family: serif;
    }

    /* תמונת ספר */
    .book-wrap {
      width: 100%;
      max-width: 420px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(150, 60, 255, 0.35);
      box-shadow: 0 0 40px rgba(120, 40, 255, 0.25);
      position: relative;
    }

    .book-wrap img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ספרות */
    .numbers-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 4px 0;
    }

    .num-chip {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      font-weight: 700;
      color: #c8a0ff;
      text-shadow: 0 0 12px rgba(180, 80, 255, 0.4);
      padding: 6px 14px;
      border: 1px solid rgba(150, 60, 255, 0.25);
      border-radius: 10px;
      background: rgba(20, 5, 50, 0.5);
      letter-spacing: 2px;
    }

    /* שדה תשובה */
    .answer-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      border: 1px solid rgba(150, 60, 255, 0.25);
      border-radius: 16px;
      padding: 20px 24px;
      background: rgba(15, 5, 35, 0.4);
    }

    .ans-label {
      font-size: 11px;
      letter-spacing: 3px;
      color: rgba(200, 140, 255, 0.7);
      text-transform: uppercase;
    }

    .letter-slots {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      direction: rtl;
    }

    .letter-slot {
      width: 48px;
      height: 56px;
      border: 2px solid rgba(150, 60, 255, 0.4);
      border-radius: 12px;
      background: rgba(20, 5, 45, 0.7);
      font-family: 'Cinzel', serif;
      font-size: 22px;
      font-weight: 700;
      color: #d0a0ff;
      text-align: center;
      outline: none;
      caret-color: #c084fc;
      transition: all 0.2s;
    }

    .letter-slot:focus {
      border-color: rgba(200, 100, 255, 0.85);
      background: rgba(60, 15, 110, 0.7);
      box-shadow: 0 0 16px rgba(160, 60, 255, 0.4);
    }

    .check-btn {
      background: linear-gradient(135deg, #7b2fff, #5a1fa8);
      border: none;
      border-radius: 50px;
      padding: 13px 52px;
      font-family: 'Heebo', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      letter-spacing: 2px;
      box-shadow: 0 6px 24px rgba(123, 47, 255, 0.5);
      transition: all 0.25s;
    }

    .check-btn:hover {
      box-shadow: 0 10px 36px rgba(123, 47, 255, 0.75);
      transform: translateY(-2px);
    }

    .feedback {
      font-size: 13px;
      color: #ff6666;
      min-height: 18px;
      text-align: center;
    }

    .feedback.ok {
      color: #00ff88;
    }

    /* פופאפ */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .overlay.hidden {
      display: none;
    }

    .popup {
      border-radius: 20px;
      padding: 36px 44px;
      text-align: center;
      max-width: 420px;
      width: 90%;
      background: linear-gradient(145deg, #0a0020, #110035);
      border: 1.5px solid rgba(150, 60, 255, 0.75);
      box-shadow: 0 0 60px rgba(120, 40, 255, 0.5);
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes popIn {
      from {
        opacity: 0;
        transform: scale(0.75);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .pop-book {
      width: 100px;
      height: auto;
      margin: 0 auto 14px;
      display: block;
      border-radius: 8px;
      box-shadow: 0 0 24px rgba(180, 80, 255, 0.5);
      animation: bookFloat 3s ease-in-out infinite alternate;
    }

    @keyframes bookFloat {
      from {
        transform: translateY(0) rotate(-2deg);
      }

      to {
        transform: translateY(-10px) rotate(2deg);
      }
    }

    .pop-title {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      color: #ffd700;
      letter-spacing: 3px;
      text-shadow: 0 0 28px rgba(255, 210, 0, 0.7);
      margin-bottom: 10px;
    }

    .pop-body {
      font-size: 14px;
      color: #d4b8ff;
      line-height: 2;
    }

    .pop-btn {
      margin-top: 22px;
      background: linear-gradient(135deg, #7b2fff, #5a1fa8);
      border: none;
      border-radius: 50px;
      padding: 12px 40px;
      font-family: 'Heebo', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(123, 47, 255, 0.5);
      transition: all 0.2s;
    }

    .pop-btn:hover {
      transform: scale(1.05);
    }

  </style>
</head>

<body>

  <div class="top-bar">
    <h1>📖 &nbsp; ספר הריקודרדום</h1>
  </div>

  <div class="main-wrap">

    <!-- טקסט מעוצב מעל -->
    <div class="top-text">
      <!-- ▼ הכנס כאן את הטקסט שמעל התמונה ▼ -->
     רק בעל הכח יחזיק בספר
    </div>

    <!-- תמונת ספר -->
    <div class="book-wrap">
      <!-- ▼ תמונת הספר ▼ -->
      <img src="img/ספר הריקורדום.webp" alt="ספר הריקודרדום"
        onerror="this.style.minHeight='200px';this.style.background='#1a0840'">
    </div>

    <!-- ספרות -->
    <div class="numbers-row">
      <div class="num-chip">4</div>
      <div class="num-chip">50</div>
      <div class="num-chip">10</div>
      <div class="num-chip">5</div>
      <div class="num-chip">1</div>
      <div class="num-chip">200</div>
      <div class="num-chip">9</div>
    </div>

    <!-- שדה תשובה -->
    <div class="answer-section">
      <div class="ans-label">◆ הכנס את התשובה</div>
      <div class="letter-slots" id="letter-slots"></div>
      <button class="check-btn" onclick="checkAnswer()">◆ &nbsp; בדוק תשובה</button>
      <div class="feedback" id="fb"></div>
    </div>

  </div>

  <!-- פופאפ ניצחון -->
  <div class="overlay hidden" id="ov-win">
    <div class="popup">
      <img class="pop-book" src="img/ספר הריקורדום.webp" alt="ספר"
        onerror="this.outerHTML='<div style=\'font-size:52px;margin-bottom:14px\'>📖</div>'">
      <div class="pop-title">הצלחתם!</div>
      <div class="pop-body">
        פיצחתם את צופן<br>
        <strong style="color:#c084fc;">ספר הריקודרדום</strong><br><br>
        הסוד נחשף — המשיכו קדימה.
      </div>
     <a href="חדר אוצרות4.html"><button class="pop-btn" onclick="goNext()">המשך ◆</button></a>
    </div>
  </div>

  <audio id="background-music" controls>
    <source src="מוזיקת רקע/מנגינה מספר 8.mp3" type="audio/mpeg">
    הדפדפן שלך אינו תומך בהשמעת אודיו.
  </audio>

  <script>
    // תשובה מוצפנת — "טראהינד"
    const _ck = btoa(unescape(encodeURIComponent('טראהינד')));
    const CORRECT = decodeURIComponent(escape(atob(_ck)));
    const LEN = [...CORRECT].length; // 7 אותיות

    // בנה תיבות
    const slotsWrap = document.getElementById('letter-slots');
    for (let i = 0; i < LEN; i++) {
      const inp = document.createElement('input');
      inp.className = 'letter-slot';
      inp.type = 'text';
      inp.maxLength = 1;
      inp.id = 'ls' + i;
      inp.addEventListener('input', () => {
        inp.value = inp.value.slice(-1);
        if (inp.value && i < LEN - 1) document.getElementById('ls' + (i + 1)).focus();
      });
      inp.addEventListener('keydown', e => {
        if (e.key === 'Backspace' && !inp.value && i > 0) document.getElementById('ls' + (i - 1)).focus();
        if (e.key === 'Enter') checkAnswer();
      });
      slotsWrap.appendChild(inp);
    }

    function checkAnswer() {
      const fb = document.getElementById('fb');
      const entered = Array.from({ length: LEN }, (_, i) => document.getElementById('ls' + i).value).join('');
      if ([...entered].length < LEN) { fb.textContent = '✗ מלא את כל האותיות'; fb.className = 'feedback'; return; }
      if (entered === CORRECT) {
        fb.textContent = '✓ נכון!'; fb.className = 'feedback ok';
        setTimeout(() => document.getElementById('ov-win').classList.remove('hidden'), 600);
      } else {
        fb.textContent = '✗ תשובה שגויה, נסה שוב'; fb.className = 'feedback';
        setTimeout(() => {
          for (let i = 0; i < LEN; i++) document.getElementById('ls' + i).value = '';
          document.getElementById('ls0').focus();
          fb.textContent = '';
        }, 900);
      }
    }

    function goNext() {
      // ▼ שנה לנתיב הדף הבא ▼
      window.location.href = 'חדר_אוצרות4.html';
    }
  </script>
</body>

</html>
