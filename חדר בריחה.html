<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>דופליקטים- חדר בריחה אונליין.</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      font-family: 'Heebo', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: radial-gradient(ellipse at 50% 100%, rgba(110, 30, 220, 0.4) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }

    .container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 700px;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(24px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .main-title {
      font-size: 26px;
      font-weight: 900;
      color: #c084fc;
      letter-spacing: 6px;
      text-shadow: 0 0 25px rgba(192, 132, 252, 0.5), 0 0 60px rgba(168, 85, 247, 0.2);
      text-align: center;
    }

    .image-box {
      width: 65%;
      border-radius: 12px;
      overflow: hidden;
    }

    .image-box img {
      width: 100%;
      height: auto;
      display: block;
    }

    .text-section {
      width: 100%;
      text-align: center;
      padding: 0 8px;
    }

    .text-section p {
      font-size: 18px;
      font-weight: 700;
      color: #a855f7;
      line-height: 2;
      text-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
    }

    .text-section p strong {
      color: #d8a4ff;
      font-weight: 900;
    }

    .btn-wrap {
      animation: floatBtn 3s ease-in-out infinite;
    }

    @keyframes floatBtn {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .main-btn {
      background: linear-gradient(135deg, #7b2fff, #5a1fa8);
      border: none;
      border-radius: 50px;
      padding: 18px 64px;
      font-family: 'Heebo', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 2px;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(123, 47, 255, 0.6), 0 2px 8px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative;
      overflow: hidden;
    }

    .main-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
      animation: shimmer 2.5s infinite;
    }

    @keyframes shimmer {
      to {
        left: 100%;
      }
    }

    .main-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 48px rgba(123, 47, 255, 0.8), 0 2px 8px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .main-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="main-title">— חדר בריחה —</div>

    <!-- ▼ החלף YOUR_IMAGE.jpg בנתיב התמונה שלך ▼ -->
    <div class="image-box">
      <img src="img/תמונה2.png" alt="דופליקטים">
    </div>

    <div class="text-section">
      <p>
        פרצתם לחדר האוצרות של המסדר!<br>
        </strong> זירו בדרך לגנוב הכל.<strong><br>
          עליכם לחלץ את האוצרות במהירות ולהעבירם למקום מבטחים לפני שהוא יגיע.
      </p>
    </div>

    <div class="btn-wrap">
      <a href="המגילה.html"><button class="main-btn">צאו לדרך >></button></a>
    </div>

  </div>

</body>

</html>
